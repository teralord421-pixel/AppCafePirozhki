services:
  db:
    image: postgres:16-alpine
    container_name: cafe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cafe_user
      POSTGRES_PASSWORD: cafe_password
      POSTGRES_DB: cafe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafe_user -d cafe_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: cafe_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://cafe_user:cafe_password@db:5432/cafe_db
      JWT_SECRET_KEY: change-me-in-production-use-openssl-rand-hex-32
      CORS_ORIGINS: http://localhost:8000,http://127.0.0.1:8000,https://YOUR_USERNAME.github.io
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: