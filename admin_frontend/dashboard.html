<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель управления — Админ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard">
    <header class="dashboard-header">
      <h1>Панель управления</h1>
      <div class="header-actions">
        <span id="user-badge" class="user-badge"></span>
        <button id="logout-btn" class="btn btn-secondary btn-sm">Выйти</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-panel="panel-users">Пользователи</button>
      <button class="tab" data-panel="panel-orders">Заказы</button>
      <button class="tab" data-panel="panel-promotions">Акции</button>
    </nav>

    <!-- Users -->
    <section id="panel-users" class="panel active">
      <div class="panel-toolbar">
        <h2>Пользователи</h2>
        <button id="add-user-btn" class="btn btn-primary btn-sm">+ Добавить</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Логин</th>
              <th>Роль</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </section>

    <!-- Orders -->
    <section id="panel-orders" class="panel">
      <div class="panel-toolbar">
        <h2>Заказы</h2>
        <button id="add-order-btn" class="btn btn-primary btn-sm">+ Добавить</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Клиент / телефон</th>
              <th>Работник</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="orders-tbody"></tbody>
        </table>
      </div>
    </section>

    <!-- Promotions -->
    <section id="panel-promotions" class="panel">
      <div class="panel-toolbar">
        <h2>Акции</h2>
        <button id="add-promotion-btn" class="btn btn-primary btn-sm">+ Добавить</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Название</th>
              <th>Описание</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="promotions-tbody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- User modal -->
  <div id="user-modal" class="modal-overlay">
    <div class="modal">
      <h3 id="user-modal-title">Новый пользователь</h3>
      <form id="user-form">
        <input type="hidden" id="user-id">
        <div class="form-group">
          <label for="user-username">Логин</label>
          <input type="text" id="user-username" required>
        </div>
        <div class="form-group">
          <label for="user-password">Пароль</label>
          <input type="password" id="user-password" placeholder="Оставьте пустым при редактировании">
        </div>
        <div class="form-group">
          <label for="user-role">Роль</label>
          <select id="user-role">
            <option value="client">client</option>
            <option value="worker">worker</option>
            <option value="admin">admin</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" id="user-cancel" class="btn btn-secondary">Отмена</button>
          <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Order modal -->
  <div id="order-modal" class="modal-overlay">
    <div class="modal">
      <h3 id="order-modal-title">Новый заказ</h3>
      <form id="order-form">
        <input type="hidden" id="order-id">
        <div class="form-group">
          <label for="order-city-id">ID города</label>
          <input type="text" id="order-city-id" required placeholder="kyiv">
        </div>
        <div class="form-group">
          <label for="order-branch-id">ID филиала</label>
          <input type="text" id="order-branch-id" required placeholder="kyiv-podil">
        </div>
        <div class="form-group">
          <label for="order-client-name">Имя клиента</label>
          <input type="text" id="order-client-name" placeholder="Олена">
        </div>
        <div class="form-group">
          <label for="order-client-phone">Телефон</label>
          <input type="text" id="order-client-phone" placeholder="+380...">
        </div>
        <div class="form-group">
          <label for="order-worker-id">ID работника (необязательно)</label>
          <input type="number" id="order-worker-id" min="1">
        </div>
        <div class="form-group">
          <label for="order-status">Статус</label>
          <select id="order-status">
            <option value="new">new</option>
            <option value="cooking">cooking</option>
            <option value="ready">ready</option>
            <option value="done">done</option>
            <option value="canceled">canceled</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" id="order-cancel" class="btn btn-secondary">Отмена</button>
          <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Promotion modal -->
  <div id="promotion-modal" class="modal-overlay">
    <div class="modal">
      <h3 id="promotion-modal-title">Новая акция</h3>
      <form id="promotion-form">
        <input type="hidden" id="promotion-id">
        <div class="form-group">
          <label for="promotion-title">Название</label>
          <input type="text" id="promotion-title" required>
        </div>
        <div class="form-group">
          <label for="promotion-description">Описание</label>
          <textarea id="promotion-description"></textarea>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="promotion-is-active" checked>
            Активна
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" id="promotion-cancel" class="btn btn-secondary">Отмена</button>
          <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
